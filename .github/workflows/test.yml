name: Test

on: [ push, pull_request ]

jobs:
  cargo-fmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - name: Run cargo fmt
        run: cargo +stable fmt --all --check

  cargo-clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - name: cargo clippy
        run: cargo +stable clippy --all-targets --workspace --no-default-features --features source -- -Dwarnings

  ceres-built-from-source:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ "ubuntu-latest", "macos-latest", "windows-latest" ]
        rust_toolchain: [ "1.85", "stable" ]

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install CMake on Linux
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake
      - name: Install Ninja on Windows
        if: ${{ runner.os == 'Windows' }}
        run: choco install ninja --no-progress
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_toolchain }}
      - name: Setup MSVC environment on Windows
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@v1
      - name: Remove MinGW/GFortran tools from PATH on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          # Remove all MinGW/MSYS/Cygwin/Strawberry Perl toolchain paths to prevent
          # cmake from finding GFortran, which it cannot test successfully in the
          # MSVC+Ninja environment (the Fortran compiler test fails, aborting cmake).
          $filtered = ($env:PATH -split ';' | Where-Object {
            $_ -notmatch '(?i)(Strawberry|mingw|msys|cygwin)'
          }) -join ';'
          "PATH=$filtered" | Out-File -Append $env:GITHUB_ENV -Encoding utf8
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: source
      - name: cargo check
        run: cargo +${{ matrix.rust_toolchain }} check --all-targets --workspace --features source
      - name: Test ceres-solver
        run: cargo +${{ matrix.rust_toolchain }} test --features source
      - name: Test ceres-solver-sys
        if: ${{ runner.os != 'Linux' }}
        run: cargo +${{ matrix.rust_toolchain }} test --features source
        working-directory: ceres-solver-sys

  system-ceres:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ "ubuntu-latest", "macos-latest", "windows-latest" ]
        rust_toolchain: [ "1.85", "stable" ]

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install ceres on Linux
        if: ${{ runner.os == 'Linux' }}
        # It would be better to use apt-get, but ceres-solver 2.2 comes only in Ubuntu 24.04
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew install ceres-solver
          echo "LD_LIBRARY_PATH=$(brew --prefix)/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "C_INCLUDE_PATH=$(brew --prefix)/include:$(brew --prefix)/include/eigen3:$C_INCLUDE_PATH" >> $GITHUB_ENV
          echo "CPATH=$(brew --prefix)/include:$(brew --prefix)/include/eigen3:$CPATH" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$(brew --prefix)/lib:$LIBRARY_PATH" >> $GITHUB_ENV
      - name: Install ceres on macOS
        if: ${{ runner.os == 'macOS' }}
        run: brew install ceres-solver
      - name: Cache vcpkg binary cache
        if: ${{ runner.os == 'Windows' }}
        uses: actions/cache@v5
        with:
          path: C:\vcpkg_cache
          key: vcpkg-ceres-x64-windows-static-md
      - name: Install ceres on Windows
        if: ${{ runner.os == 'Windows' }}
        env:
          VCPKG_BINARY_SOURCES: "clear;files,C:\\vcpkg_cache,readwrite"
        run: |
          New-Item -ItemType Directory -Force -Path C:\vcpkg_cache | Out-Null
          vcpkg install ceres:x64-windows-static-md
          $root = $env:VCPKG_INSTALLATION_ROOT
          echo "VCPKG_ROOT=$root" >> $env:GITHUB_ENV
          echo "VCPKGRS_TRIPLET=x64-windows-static-md" >> $env:GITHUB_ENV
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: system
      - name: Check ceres-solver
        run: cargo +${{ matrix.rust_toolchain }} check --all-targets --features system
      - name: Check ceres-solver-sys
        run: cargo +${{ matrix.rust_toolchain }} check --all-targets --features system
        working-directory: ceres-solver-sys
      - name: Test ceres-solver
        run: cargo +${{ matrix.rust_toolchain }} test --features system
      - name: Test ceres-solver-sys
        if: ${{ runner.os != 'Linux' }}
        run: cargo +${{ matrix.rust_toolchain }} test --features system
        working-directory: ceres-solver-sys
